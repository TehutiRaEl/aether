services:
  aether:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_CONNECT_CLIENT_ID=${STRIPE_CONNECT_CLIENT_ID:-}
      - LICENSE_SECRET=${LICENSE_SECRET:?LICENSE_SECRET must be set (32+ chars)}
      - DATABASE_PATH=${DATABASE_PATH:-/data/authority.sqlite}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - BRAND_EMAIL=${BRAND_EMAIL:-}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - LAS_API_KEY=${LAS_API_KEY:-}
      - QUEEN_URL=${QUEEN_URL:-http://host.docker.internal:8080}
    volumes:
      - aether_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/colony/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  aether_data:
